<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/main.css" />
    <script defer src="/main.js"></script>
    <script defer src="/notes.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        text-decoration: none;
        box-sizing: border-box;
        font-family: "segoe UI";
      }

      :root {
        --gray-0: #f8f9fa;
        --gray-1: #f1f3f5;
        --gray-2: #e9ecef;
        --gray-3: #dee2e6;
        --gray-4: #ced4da;
        --gray-5: #adb5bd;
        --gray-6: #868e96;
        --gray-7: #495057;
        --gray-8: #343a40;
        --gray-9: #212529;
        --gray-11: #0d0f12;
        --gray-12: #030507;

        --red-9: #c92a2a;
        --red-2: #ffc9c9;

        --green-9: #2b8a3e;
        --green-1: #d3f9d8;

        --fds-gray-05: #f2f3f5;

        --fds-blue-5: #339af0;
        --fds-blue-60: #1877f2;
        --fds-blue-70: #4267b2;
        --fds-blue-80: #3b5998;

        --ease-2: cubic-bezier(0.25, 0, 0.4, 1);
        --ease-4: cubic-bezier(0.25, 0, 0.2, 1);
        --ease-3: cubic-bezier(0.25, 0, 0.3, 1);

        --ease-out-4: cubic-bezier(0, 0, 0.1, 1);
        --ease-out-5: cubic-bezier(0, 0, 0, 1);
        --ease-spring-2: linear(
          0,
          0.007,
          0.029 2.2%,
          0.118 4.7%,
          0.625 14.4%,
          0.826 19%,
          0.902,
          0.962,
          1.008 26.1%,
          1.041 28.7%,
          1.064 32.1%,
          1.07 36%,
          1.061 40.5%,
          1.015 53.4%,
          0.999 61.6%,
          0.995 71.2%,
          1
        );

        --ease-spring-4: linear(
          0,
          0.009,
          0.037 1.7%,
          0.153 3.6%,
          0.776 10.3%,
          1.001,
          1.142 16%,
          1.185,
          1.209 19%,
          1.215 19.9% 20.8%,
          1.199,
          1.165 25%,
          1.056 30.3%,
          1.008 33%,
          0.973,
          0.955 39.2%,
          0.953 41.1%,
          0.957 43.3%,
          0.998 53.3%,
          1.009 59.1% 63.7%,
          0.998 78.9%,
          1
        );
      }

      html {
        scroll-behavior: smooth;
      }
      body {
        background: #234567;
        /* overscroll-behavior: contain; */
      }
      .wrapper {
        width: 800px;
        margin: 3rem auto;
        height: auto;
        padding: 0.5rem;
        border: 4px solid slategray;
        box-shadow: 2px 3px 6px 0 rgba(0, 0, 0, 0.31);

        overflow: hidden;
      }

      .carousel {
        /* padding: 0.5rem ; */
        width: 1074px;
        height: 300px;

        display: flex;
        display: grid;
        grid-auto-flow: column;

        gap: 20px;
        overflow: auto;
        /* border: 1px solid red; */
      }

      .carousel li {
        flex: 1;
        width: 350px;
        height: 100%;
        border-radius: 2px;
        background-color: white;
        cursor: pointer;
        box-shadow: 0 2px 16px 0 rgba(0, 0, 0, 0.31);

        object-fit: cover;
        object-position: center;
        /* aspect-ratio: 14/9; */

        background-position: center;
        background-size: 100% 100%;
        background-size: cover;
        background-repeat: no-repeat;

        border: 4px solid #ddd;
      }

      .carousel li:nth-child(1) {
        background-image: url(/imgs/img_landscape_01.jpg);
      }
      .carousel li:nth-child(2) {
        background-image: url(/imgs/img_landscape_02.jpg);
      }
      .carousel li:nth-child(3) {
        background-image: url(/imgs/img_landscape_03.jpg);
      }
      .carousel li:nth-child(4) {
        background-image: url(/imgs/img_landscape_04.jpg);
      }
      .carousel li:nth-child(5) {
        background-image: url(/imgs/img_landscape_05.jpg);
      }
      .carousel li:nth-child(6) {
        background-image: url(/imgs/img_landscape_06.jpg);
      }
      .carousel li:nth-child(7) {
        background-image: url(/imgs/img_portrait_01.jpg);
      }
      .carousel li:nth-child(8) {
        background-image: url(/imgs/img_portrait_02.jpg);
      }
      .carousel li:nth-child(9) {
        background-image: url(/imgs/img_portrait_03.jpg);
      }
      .carousel li:nth-child(10) {
        background-image: url(/imgs/img_portrait_04.jpg);
      }


      .dashboard {
        width: 90%;
        margin: 0 auto 2rem;
        height: 300px;
        background: #f5f5f5;
        box-shadow: 2px 2px 3px 0 rgba(0, 0, 0, 0.31);
        padding: 1rem;

      }
      .dashboard button {
        border: none;
        font-size: 12px;
        background: #e0e0e0;
        padding: .25rem .5rem;
        margin: 2rem 0;
        cursor: pointer;
        border-radius: 3px;
        color: #444;
        transition: .2s ease;
        border: 1px solid #ccc;
      }
      .dashboard button:hover {
        box-shadow: 0 6px 2px -4px rgba(0, 0, 0, 0.3);
        transform: translateY(-2px);
      }
      @media screen and (max-width: 968px) {
      }
    </style>
    <title>index</title>
  </head>

  <body>
    <div class="wrapper">
      <ul class="carousel">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
    </div>


    <div class="dashboard">
        <button class="color_theme">Set Color Theme</button>
        <button class="color_theme">Disable</button>

        <input type="checkbox" >
        <button class="color_theme">Update</button>
    </div>

    <!-- SCRIPT.JS -->
    <script>
      const cards = [...document.querySelectorAll(" .carousel li")];
    function triggerFn(e) {

        console.log('trigger triggered', e.target)
    }
      const clickFn = (e) => {
        const that = e.target;
        triggerFn(e)
      };

      for (let card of cards) {
        card.addEventListener("click", clickFn);
      }
    </script>
  </body>
</html>

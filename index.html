<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/main.css" />
  <script defer src="/main.js"></script>
  <script defer src="/notes.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      text-decoration: none;
      box-sizing: border-box;
      font-family: "segoe UI";
    }

    :root {
      --gray-0: #f8f9fa;
      --gray-1: #f1f3f5;
      --gray-2: #e9ecef;
      --gray-3: #dee2e6;
      --gray-4: #ced4da;
      --gray-5: #adb5bd;
      --gray-6: #868e96;
      --gray-7: #495057;
      --gray-8: #343a40;
      --gray-9: #212529;
      --gray-11: #0d0f12;
      --gray-12: #030507;

      --red-9: #c92a2a;
      --red-2: #ffc9c9;

      --green-9: #2b8a3e;
      --green-1: #d3f9d8;

      --fds-gray-05: #f2f3f5;

      --fds-blue-5: #339af0;
      --fds-blue-60: #1877f2;
      --fds-blue-70: #4267b2;
      --fds-blue-80: #3b5998;

      --ease-2: cubic-bezier(0.25, 0, 0.4, 1);
      --ease-4: cubic-bezier(0.25, 0, 0.2, 1);
      --ease-3: cubic-bezier(0.25, 0, 0.3, 1);

      --ease-out-4: cubic-bezier(0, 0, 0.1, 1);
      --ease-out-5: cubic-bezier(0, 0, 0, 1);
      --ease-spring-2: linear(0,
          0.007,
          0.029 2.2%,
          0.118 4.7%,
          0.625 14.4%,
          0.826 19%,
          0.902,
          0.962,
          1.008 26.1%,
          1.041 28.7%,
          1.064 32.1%,
          1.07 36%,
          1.061 40.5%,
          1.015 53.4%,
          0.999 61.6%,
          0.995 71.2%,
          1);

      --ease-spring-4: linear(0,
          0.009,
          0.037 1.7%,
          0.153 3.6%,
          0.776 10.3%,
          1.001,
          1.142 16%,
          1.185,
          1.209 19%,
          1.215 19.9% 20.8%,
          1.199,
          1.165 25%,
          1.056 30.3%,
          1.008 33%,
          0.973,
          0.955 39.2%,
          0.953 41.1%,
          0.957 43.3%,
          0.998 53.3%,
          1.009 59.1% 63.7%,
          0.998 78.9%,
          1);
    }

    html {
      scroll-behavior: smooth;
      accent-color: #234567;
    }

    body {
      background: #234567;
      min-height: 100%;
      position: relative;
      overflow: hidden;
      /* overscroll-behavior: contain; */
    }

    .content {
      width: 95%;
      margin: 2rem auto;
      padding: 2rem 0;
      height: 90vh;
 
      overflow:auto;
    
      /* overscroll-behavior: contain; */
    border: 4px solid slategray;
    }

    .wrapper {
      width: 1000px;
      margin: 2rem auto;
      height: 350px;
      padding: 0.5rem;
      border: 4px solid slategray;
      box-shadow: 2px 3px 6px 0 rgba(0, 0, 0, 0.31);

      overflow: hidden;
    }

    .carousel {
      width: 1200px;
      height: 300px;

      display: flex;
      display: grid;
      grid-auto-flow: column;

      gap: 20px;
      overflow: auto;
      /* border: 1px solid red; */
    }

    .carousel li {
      flex: 1;
      width: 350px;
      height: 100%;
      border-radius: 2px;
      background-color: white;
      cursor: pointer;
      box-shadow: 0 2px 16px 0 rgba(0, 0, 0, 0.31);

      object-fit: cover;
      object-position: center;
      /* aspect-ratio: 14/9; */

      background-position: center;
      background-size: 100% 100%;
      background-size: cover;
      background-repeat: no-repeat;

      border: 4px solid #ddd;
    }

    .carousel li:nth-child(1) {
      background-image: url(/imgs/img_landscape_01.jpg);
    }

    .carousel li:nth-child(2) {
      background-image: url(/imgs/img_landscape_02.jpg);
    }

    .carousel li:nth-child(3) {
      background-image: url(/imgs/img_landscape_03.jpg);
    }

    .carousel li:nth-child(4) {
      background-image: url(/imgs/img_landscape_04.jpg);
    }

    .carousel li:nth-child(5) {
      background-image: url(/imgs/img_landscape_05.jpg);
    }

    .carousel li:nth-child(6) {
      background-image: url(/imgs/img_landscape_06.jpg);
    }

    .carousel li:nth-child(7) {
      background-image: url(/imgs/img_portrait_01.jpg);
    }

    .carousel li:nth-child(8) {
      background-image: url(/imgs/img_portrait_02.jpg);
    }

    .carousel li:nth-child(9) {
      background-image: url(/imgs/img_portrait_03.jpg);
    }

    .carousel li:nth-child(10) {
      background-image: url(/imgs/img_portrait_04.jpg);
    }

    .dashboard {
      width: 85%;
      margin: 0 auto 2rem;
      height: 300px;
      background: #f5f5f5;
      box-shadow: 2px 2px 3px 0 rgba(0, 0, 0, 0.31);
      padding: 1rem;
    }

    .dashboard button {
      border: none;
      font-size: 12px;
      background: #e0e0e0;
      padding: 0.25rem 0.5rem;
      margin: 2rem 0;
      cursor: pointer;
      border-radius: 3px;
      color: #444;
      transition: 0.2s ease;
      border: 1px solid #ccc;
    }

    .dashboard button:hover {
      box-shadow: 0 6px 2px -4px rgba(0, 0, 0, 0.3);
      transform: translateY(-2px);
    }

    .modal_element {
      position: fixed;

      inset: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.4);
      display: none;
      z-index: 9999;
    }

    .modal_element span {
      position: absolute;
      padding: 0.5rem;
      display: inline-block;
      border-radius: 50px;
      cursor: pointer;
    }

    .modal_element span:hover {
      background: rgba(0, 0, 0, 0.4);
    }

    .modal .modal_element {
      display: block;
    }

    /* @media screen and (max-width: 968px) {} */
  </style>
  <title>index</title>
</head>

<body>

  <div class="modal_element">

    <span>

      <svg fill="#eee" width="20px" height="20px" viewBox="0 0 36 36" version="1.1" preserveAspectRatio="xMidYMid meet"
        xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" <title>times-line</title>
        <path class="clr-i-outline clr-i-outline-path-1"
          d="M19.41,18l8.29-8.29a1,1,0,0,0-1.41-1.41L18,16.59,9.71,8.29A1,1,0,0,0,8.29,9.71L16.59,18,8.29,26.29a1,1,0,1,0,1.41,1.41L18,19.41l8.29,8.29a1,1,0,0,0,1.41-1.41Z">
        </path>
        <rect x="0" y="0" width="36" height="36" fill-opacity="0" />


      </svg>

    </span>
  </div>

  <div class="content">


    <div class="wrapper">
      <ul class="carousel">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
    </div>

    <div class="dashboard">
      <button class="color_theme">Set Color Theme</button>
      <button class="disable_btn">Disable</button>

      <input type="checkbox" />
      <button class="color_theme">Update</button>
    </div>


  </div>

  <!-- SCRIPT.JS -->
  <script>
    const cards = [...document.querySelectorAll(" .carousel li")];

    document.querySelector('.color_theme').addEventListener('click', function (e) {
      document.body.classList.add('modal');
    })

    document.querySelector('.modal_element span').addEventListener('click', function () {
      document.body.classList.remove('modal');

    })


    function triggerFn(e) {
      console.log("trigger triggered", e.target);
    }
    const clickFn = (e) => {
      const that = e.target;
      triggerFn(e);
    };

    for (let card of cards) {
      card.addEventListener("click", clickFn);
    }
  </script>
</body>

</html>
